<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 390" width="100%" height="auto" style="max-width:900px">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#666"/>
    </marker>
  </defs>
  <!-- Box 1: Start -->
  <rect x="40" y="160" width="180" height="70" rx="8" ry="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="130" y="195" text-anchor="middle" fill="#333" font-family="Arial,sans-serif" font-size="13">Discuss topic with</text>
  <text x="130" y="213" text-anchor="middle" fill="#333" font-family="Arial,sans-serif" font-size="13">Socratic questions</text>
  <!-- Arrow 1->2 -->
  <line x1="220" y1="195" x2="270" y2="195" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Box 2: Confirm -->
  <rect x="280" y="160" width="190" height="70" rx="8" ry="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="375" y="195" text-anchor="middle" fill="#333" font-family="Arial,sans-serif" font-size="13">Confirm positive</text>
  <text x="375" y="213" text-anchor="middle" fill="#333" font-family="Arial,sans-serif" font-size="13">actionable decisions</text>
  <!-- Arrow 2->3 -->
  <line x1="470" y1="195" x2="520" y2="195" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Box 3: Record -->
  <rect x="530" y="160" width="170" height="70" rx="8" ry="8" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="615" y="195" text-anchor="middle" fill="#333" font-family="Arial,sans-serif" font-size="13">Update topic</text>
  <text x="615" y="213" text-anchor="middle" fill="#333" font-family="Arial,sans-serif" font-size="13">record.md</text>
  <!-- Arrow 3->4 -->
  <line x1="700" y1="195" x2="750" y2="195" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Box 4: Diagram -->
  <rect x="760" y="160" width="190" height="70" rx="8" ry="8" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="855" y="195" text-anchor="middle" fill="#333" font-family="Arial,sans-serif" font-size="13">Add editable draw.io</text>
  <text x="855" y="213" text-anchor="middle" fill="#333" font-family="Arial,sans-serif" font-size="13">diagram when useful</text>
  <!-- Arrow 4->5 -->
  <line x1="950" y1="195" x2="1000" y2="195" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Box 5: HTML -->
  <rect x="1010" y="160" width="190" height="70" rx="8" ry="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="1105" y="195" text-anchor="middle" fill="#333" font-family="Arial,sans-serif" font-size="13">Refresh record.html</text>
  <text x="1105" y="213" text-anchor="middle" fill="#333" font-family="Arial,sans-serif" font-size="13">for presentation</text>
</svg>