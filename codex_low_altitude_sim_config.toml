#:schema https://developers.openai.com/codex/config-schema.json

# Codex config for the Low-Altitude Flight Simulation / FlightCore project.
#
# Uses the newer beta permission-profile system:
#   default_permissions + [permissions.<profile>]
# Do NOT combine this with older sandbox_mode / sandbox_workspace_write keys.
#
# GitHub is domain-allowlisted here. Repository-level preference should be
# enforced in AGENTS.md or project instructions, because domain rules cannot
# reliably restrict access to individual GitHub repositories.

approval_policy = "on-request"
default_permissions = "low-alt-sim-dev"
web_search = "cached"
allow_login_shell = false
model_reasoning_effort = "high"
personality = "pragmatic"

[permissions.low-alt-sim-dev]
description = "Workspace-write profile for low-altitude flight simulation development with curated aviation, simulation, UTM, and research network access."
extends = ":workspace"

[permissions.low-alt-sim-dev.workspace_roots]
"." = true

[permissions.low-alt-sim-dev.filesystem]
":minimal" = "read"
glob_scan_max_depth = 6

[permissions.low-alt-sim-dev.filesystem.":workspace_roots"]
"." = "write"
".codex" = "read"
".git" = "read"
".github" = "read"
".devcontainer" = "read"
".vscode" = "read"
".idea" = "read"
"docs" = "write"
"src" = "write"
"tests" = "write"
"examples" = "write"
"scripts" = "write"
"configs" = "write"
"data" = "write"
"notebooks" = "write"

# Sensitive files: deny both read and write, even inside writable workspace roots.
".env" = "deny"
".env.*" = "deny"
"*.env" = "deny"
"*/*.env" = "deny"
"*/*/*.env" = "deny"
"**/*.env" = "deny"
"**/.env" = "deny"
"**/.env.*" = "deny"
"**/*secret*" = "deny"
"**/*secrets*" = "deny"
"**/*token*" = "deny"
"**/*credential*" = "deny"
"**/*credentials*" = "deny"
"**/*password*" = "deny"
"**/id_rsa" = "deny"
"**/id_ed25519" = "deny"
"**/*.pem" = "deny"
"**/*.key" = "deny"
"**/*.p12" = "deny"
"**/*.pfx" = "deny"
"**/auth.json" = "deny"
"**/credentials.json" = "deny"
"**/service-account*.json" = "deny"
"**/config/secrets.*" = "deny"
"**/.aws" = "deny"
"**/.azure" = "deny"
"**/.gcloud" = "deny"
"**/.ssh" = "deny"
"**/.gnupg" = "deny"

[permissions.low-alt-sim-dev.network]
enabled = true
mode = "limited"
allow_local_binding = false
allow_upstream_proxy = false
dangerously_allow_non_loopback_proxy = false
dangerously_allow_all_unix_sockets = false
enable_socks5 = false
enable_socks5_udp = false

[permissions.low-alt-sim-dev.network.domains]

